services:
  neo4j:
    image: neo4j:5.24
    container_name: movie-rec-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  app:
    build: .
    container_name: movie-rec-app
    depends_on:
      - neo4j
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
      NEO4J_DATABASE: neo4j

volumes:
  neo4j_data:
  neo4j_logs:
