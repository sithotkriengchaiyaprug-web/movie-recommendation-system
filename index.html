<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - MovieRec</title>
    <link rel="stylesheet" href="css/netflix.css">
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="logo">MOVIEREC</a>
        <div class="nav-links">
            <a href="index.html" class="active">🏠 Home</a>
            <a href="profile.html">👤 Users</a>
            <a href="history.html">🎬 Movies</a>
            <a href="my-recommendations.html">📊 Recommend</a>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <h2>✨ เลือกหนังที่คุณชื่นชอบเพื่อเริ่มต้น</h2>
        <p style="color: #888; margin-bottom: 30px;">เลือกหนังอย่างน้อย 1 เรื่อง แล้วกดยืนยันด้านล่าง เพื่อให้เราแนะนำหนังที่เหมาะกับคุณ</p>
        <div class="movie-grid" id="movieGrid"></div>
    </div>

    <!-- ปุ่มกดยืนยัน จะเด้งขึ้นมาตอนเลือกหนัง -->
    <button class="floating-confirm" id="confirmBtn" onclick="confirmSelection()">
        ยืนยันภาพยนตร์ที่เลือก (<span id="selectCount">0</span>) ➔
    </button>

    <script>
        const currentUser = localStorage.getItem('currentUser');
        if(!currentUser) window.location.href = 'login.html';

        let selectedMovies = []; // เก็บหนังที่ถูกคลิก

        async function loadMovies() {
            const res = await fetch('http://localhost:4000/api/movies');
            const movies = await res.json();
            const grid = document.getElementById('movieGrid');
            
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => toggleSelect(movie.title, card);
                card.innerHTML = `
                    <img src="${movie.image_url}" alt="${movie.title}">
                    <div class="like-overlay" id="overlay-${movie.title}">
                        <div class="like-icon">❤️</div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        // แค่เลือกไว้ ยังไม่ได้บันทึก
        function toggleSelect(title, card) {
            const overlay = card.querySelector('.like-overlay');
            const index = selectedMovies.indexOf(title);

            if(index === -1) {
                selectedMovies.push(title);
                overlay.classList.add('active');
            } else {
                selectedMovies.splice(index, 1);
                overlay.classList.remove('active');
            }

            // จัดการปุ่ม Confirm โผล่ขึ้นมา
            document.getElementById('selectCount').innerText = selectedMovies.length;
            if(selectedMovies.length > 0) {
                document.getElementById('confirmBtn').classList.add('show');
            } else {
                document.getElementById('confirmBtn').classList.remove('show');
            }
        }

        // เมื่อกดยืนยัน (ส่ง API รัวๆ แล้วเด้งหน้า)
        async function confirmSelection() {
            const btn = document.getElementById('confirmBtn');
            btn.innerHTML = "⏳ กำลังบันทึกและวิเคราะห์ข้อมูล...";
            btn.style.pointerEvents = "none";

            // วนลูปเซฟหนังทีละเรื่อง
            for (const movie of selectedMovies) {
                await fetch('http://localhost:4000/api/relationships', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: currentUser, movie: movie, type: 'LIKED' })
                });
            }
            
            // เสร็จแล้ว เด้งไปหน้า Recommend ทันที!
            window.location.href = 'my-recommendations.html';
        }

        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; }
        loadMovies();
    </script>
</body>
</html>
