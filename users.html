<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 Users - MovieRec</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand"><span>🎬</span> MovieRec</a>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <ul class="navbar-links" id="navLinks">
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="users.html" class="active">👤 Users</a></li>
                <li><a href="movies.html">🎬 Movies</a></li>
                <li><a href="recommend.html">📊 Recommend</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>👤 จัดการ Users</h1>
            <p>เพิ่ม ลบ และดูรายชื่อผู้ใช้ทั้งหมดในระบบ</p>
        </div>

        <div class="grid-2">
            <!-- Add User Form -->
            <div class="card">
                <div class="card-header">
                    <h2>➕ เพิ่ม User ใหม่</h2>
                </div>
                <div class="card-body">
                    <form id="addUserForm">
                        <div class="form-group">
                            <label for="userName">ชื่อ User</label>
                            <input type="text" id="userName" class="form-control"
                                placeholder="เช่น John, Alice, สมชาย..." required autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="userAge">อายุ (ไม่บังคับ)</label>
                            <input type="number" id="userAge" class="form-control" placeholder="เช่น 25" min="1"
                                max="120">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block" id="addUserBtn">
                            ➕ เพิ่ม User
                        </button>
                    </form>

                    <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border);">
                        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.75rem;">
                            ⚡ เพิ่มข้อมูลตัวอย่าง:
                        </p>
                        <button class="btn btn-outline btn-sm" id="sampleUsersBtn">
                            🎲 เพิ่ม Sample Users (5 คน)
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stats & Danger Zone -->
            <div class="card">
                <div class="card-header">
                    <h2>📊 สถิติ Users</h2>
                    <button class="btn btn-sm btn-outline" id="refreshUsersBtn">🔄 Refresh</button>
                </div>
                <div class="card-body">
                    <div class="grid-2" style="gap:1rem; margin-bottom:1.5rem;">
                        <div class="stat-card" style="padding:1rem;">
                            <div class="stat-number" id="userCount">-</div>
                            <div class="stat-label">Users ทั้งหมด</div>
                        </div>
                        <div class="stat-card" style="padding:1rem;">
                            <div class="stat-number" id="activeUsers">-</div>
                            <div class="stat-label">มีความสัมพันธ์</div>
                        </div>
                    </div>
                    <div class="danger-zone">
                        <p>⚠️ Danger Zone</p>
                        <button class="btn btn-danger btn-sm" id="deleteAllUsersBtn">
                            🗑️ ลบ Users ทั้งหมด
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- User List -->
        <div class="card" style="margin-top:1.5rem;">
            <div class="card-header">
                <h2>📋 รายชื่อ Users ทั้งหมด</h2>
                <span class="badge badge-primary" id="userCountBadge">0 คน</span>
            </div>
            <div class="card-body">
                <div id="userList">
                    <div class="loading-overlay">
                        <div class="spinner"></div>
                        <span>กำลังโหลด...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/users.js"></script>
</body>

</html>
